# CareerCoach — host nginx site for careercoach.cs.colman.ac.il
# Install: sudo cp deploy/nginx/careercoach-proxy.inc /etc/nginx/careercoach-proxy.inc
#          sudo cp deploy/nginx/careercoach.conf /etc/nginx/sites-available/careercoach
#          sudo ln -sf /etc/nginx/sites-available/careercoach /etc/nginx/sites-enabled/careercoach
#          sudo nginx -t && sudo systemctl reload nginx
# NOTE: verify the certificate/key filenames under /etc/ssl/cs before enabling.
#
# Path routing: the SPA has page routes /chat, /skill-matcher and /roadmap whose API
# counterparts always carry a subpath (/chat/ws, /skill-matcher/:id, /roadmap/generate).
# Bare page URLs therefore fall through to the SPA; only subpath forms are proxied.

server {
    listen 80;
    listen [::]:80;
    server_name careercoach.cs.colman.ac.il;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name careercoach.cs.colman.ac.il;

    ssl_certificate     /etc/ssl/cs/CSB.crt;
    ssl_certificate_key /etc/ssl/cs/myserver.key;

    # CV uploads (users-service caps files at 5 MB; leave headroom)
    client_max_body_size 20m;

    root /var/www/careercoach;
    index index.html;

    # chat-service WebSocket (^~ so the regex locations below cannot shadow it)
    location ^~ /chat/ws {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        include /etc/nginx/careercoach-proxy.inc;
    }

    # users-service (API calls under /users always carry an id subpath)
    location ~ ^/(api/auth|api/users|api/github|api/admin|users/) {
        proxy_pass http://127.0.0.1:3001;
        include /etc/nginx/careercoach-proxy.inc;
    }

    # chat-service REST (bare /chat is an SPA page; APIs are /chat/... and /api/chat/...)
    location ~ ^/(api/chat|chat)/ {
        proxy_pass http://127.0.0.1:3002;
        include /etc/nginx/careercoach-proxy.inc;
    }

    # job-service (/jobs and /career-roadmap are called bare; /skill-matcher only with subpath)
    location ~ ^/(jobs|career-roadmap|skill-matcher/) {
        proxy_pass http://127.0.0.1:3003;
        include /etc/nginx/careercoach-proxy.inc;
    }

    # evaluation-service
    location /evaluation-cases {
        proxy_pass http://127.0.0.1:3004;
        include /etc/nginx/careercoach-proxy.inc;
    }

    # roadmap-service (bare /roadmap is an SPA page; API is /roadmap/generate)
    location ^~ /roadmap/ {
        proxy_pass http://127.0.0.1:3005;
        include /etc/nginx/careercoach-proxy.inc;
    }

    # SPA static files + client-side routing fallback
    location / {
        try_files $uri /index.html;
    }
}
